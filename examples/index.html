<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tritonet Website Embed Example</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
      color: #1f2937;
      background: #f8fafc;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .embed {
      width: 100%;
      max-width: 1100px;
      height: 734px;
      border: 0;
      border-radius: 10px;
      display: block;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Tritonet on a normal website</h1>
      <p>
        This page has normal content (text/images/components) and embeds Tritonet below.
      </p>
      <img
        src="https://picsum.photos/1000/220"
        alt="Example website banner"
        style="max-width:100%; border-radius:10px; display:block;"
      />
    </section>

    <section class="card">
      <h2>Tritonet Embed</h2>
      <iframe
        class="embed"
        src="../dist/Tritonet_Web.html"
        title="Tritonet Brainwave"
        allow="midi; autoplay"
      ></iframe>
      <p style="margin-top:10px; color:#6b7280; font-size:14px;">
        Tip: click inside Tritonet first to ensure keyboard controls are active.
      </p>
    </section>
  </main>
</body>
</html>
